<!DOCTYPE html>
<html>

<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Name Generator</title>
        <link rel="stylesheet" href="style.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet"> 
</head>

<body>
        <div class="main-box">
                <h1 id="title"> First Name Generator </h1>
                <p id="desc"> A simple place to generate a randomized name </p>
                <h4 class="descriptor"> ♂Male Name </h4>
                <h3 class = "name" id="male-name"> Male name </h3>
                <h4 class="descriptor"> ♀Female Name </h4>
                <h3 class = "name" id="female-name"> Female name </h3>
                <button id="generate-name"> Generate name </button>
        </div>
        
        <footer>
                <p id="copyright"> Copyright (c) 2026 Nuno Guevara. <br> Licensed under the GNU GPLv3. </p>
        </footer>
        
        <script src="script.js"></script>
        
</body>

</html>
